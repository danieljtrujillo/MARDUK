# ByT5-base model config for plain-format Akkadianâ†’English translation
# Compatible with public pre-trained models (assiaben, mattiaangeli, etc.)
model_name_or_path: google/byt5-base

# Plain format is shorter than dual-view (no <raw>/<norm> overhead)
source_max_length: 512
target_max_length: 384

# Generation: match public model configs (longer output, more beams)
generation:
  num_beams: 8
  length_penalty: 1.3
  repetition_penalty: 1.2
  no_repeat_ngram_size: 0
  early_stopping: true
