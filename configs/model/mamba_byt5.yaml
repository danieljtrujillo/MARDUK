# Mamba-enhanced ByT5 model config
# Phase 1 ByT5 checkpoint with BiMamba SSM adapter layers injected after encoder
base_model: google/byt5-base
checkpoint: outputs/runs/byt5_base/best

source_max_length: 1024
target_max_length: 256

# Mamba adapter config
adapter:
  n_layers: 2
  d_state: 16
  d_conv: 4
  expand: 2
  dropout: 0.1

# Generation parameters
generation:
  num_beams: 5
  length_penalty: 0.9
  no_repeat_ngram_size: 3
  early_stopping: true
